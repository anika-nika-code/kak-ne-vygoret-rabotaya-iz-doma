<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка соединения</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: #0d0d0d;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .overlay {
            position: fixed; inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.05) 0px,
                rgba(0,0,0,0.05) 1px,
                transparent 1px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 5;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        .loader {
            width: 40px; height: 40px;
            border: 4px solid #333;
            border-top-color: #ff3b30;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }

        .error-code {
            font-size: 7rem;
            font-weight: 800;
            color: #ff3b30;
            text-shadow: 0 0 15px rgba(255,59,48,0.5);
            margin: 10px 0;
            letter-spacing: 2px;
        }

        .error-text {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 25px;
        }

        .btn {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 10px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover:not(:disabled) { background: #ff3b30; border-color: #ff3b30; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .status {
            position: absolute;
            bottom: 30px;
            left: 50%; transform: translateX(-50%);
            background: rgba(20,20,20,0.8);
            padding: 8px 16px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #888;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        .flicker { animation: flicker 0.1s infinite; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <div class="loader" id="loader"></div>
        <div class="error-code" id="code">500</div>
        <div class="error-text" id="text">Внутренняя ошибка сервера</div>
        <button class="btn" id="retry">Повторить попытку</button>
    </div>
    <div class="status" id="status">Загрузка ресурсов... 38%</div>

    <script>
        const loader = document.getElementById('loader');
        const codeEl = document.getElementById('code');
        const textEl = document.getElementById('text');
        const btn = document.getElementById('retry');
        const status = document.getElementById('status');

        let tries = 0;
        const errors = [
            { code: '502', text: 'Недопустимый шлюз' },
            { code: '504', text: 'Превышено время ожидания' },
            { code: 'ERR_CONNECTION_REFUSED', text: 'Соединение отклонено' }
        ];

        // Имитация первой загрузки
        setTimeout(() => {
            loader.style.display = 'none';
            status.textContent = 'Соединение потеряно';
        }, 2500);

        btn.addEventListener('click', () => {
            if (tries >= errors.length) return;
            
            btn.disabled = true;
            loader.style.display = 'block';
            status.textContent = `Повторное подключение... ${Math.floor(Math.random()*40+10)}%`;

            setTimeout(() => {
                loader.style.display = 'none';
                const err = errors[tries];
                codeEl.textContent = err.code;
                textEl.textContent = err.text;
                status.textContent = `Ошибка: ${err.code}`;
                tries++;
                btn.disabled = false;

                if (tries >= errors.length) {
                    btn.textContent = 'Восстановление невозможно';
                    btn.style.cursor = 'default';
                    codeEl.classList.add('flicker');
                    status.textContent = 'Сессия завершена принудительно';
                }
            }, 1800);
        });
    </script>
</body>
</html>
